
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Navigator - Zustellbezirk 92224-08</title>
<style>
  :root {
    --dhl-yellow: #FFCC00;
    --dhl-red: #D40511;
    --dark: #1a1a1a;
    --card-bg: #222;
    --done: #2ecc71;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    background: var(--dark);
    color: #fff;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  header {
    background: var(--dhl-red);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(212,5,17,0.5);
  }

  .logo { font-size: 28px; font-weight: 900; color: var(--dhl-yellow); letter-spacing: 2px; }

  .progress-info { text-align: right; font-size: 13px; color: rgba(255,255,255,0.9); }
  .progress-info span { display: block; font-weight: 700; font-size: 16px; color: var(--dhl-yellow); }

  .progress-bar-wrap { background: rgba(0,0,0,0.3); height: 6px; width: 100%; }
  .progress-bar-fill { height: 6px; background: var(--dhl-yellow); transition: width 0.4s ease; }

  .current-hero {
    margin: 16px;
    background: linear-gradient(135deg, #2a2a00, #3a3000);
    border: 2px solid var(--dhl-yellow);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stop-badge {
    display: inline-block;
    background: var(--dhl-yellow);
    color: #000;
    font-weight: 900;
    font-size: 13px;
    padding: 3px 12px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  .current-street {
    font-size: 24px;
    font-weight: 900;
    color: var(--dhl-yellow);
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .current-numbers { font-size: 14px; color: rgba(255,255,255,0.8); line-height: 1.6; }
  .current-numbers strong {
    color: #fff;
    font-size: 11px;
    display: block;
    margin-bottom: 2px;
    opacity: 0.6;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .nav-buttons { display: flex; gap: 10px; margin-top: 16px; }

  .btn-done {
    flex: 1;
    background: var(--done);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }

  .btn-prev {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
  }

  .next-preview {
    margin: 0 16px 16px;
    background: #2a2a2a;
    border-radius: 12px;
    padding: 14px 16px;
    border-left: 4px solid #555;
  }
  .next-label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
  .next-street { font-size: 16px; font-weight: 700; color: #ccc; }

  .route-list { padding: 0 16px; display: flex; flex-direction: column; gap: 6px; }

  .stop-item {
    background: var(--card-bg);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .stop-item.done { opacity: 0.4; }
  .stop-item.active { border-color: var(--dhl-yellow); background: #2a2700; }

  .stop-num {
    min-width: 32px; height: 32px;
    background: #444; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 12px;
  }
  .stop-item.active .stop-num { background: var(--dhl-yellow); color: #000; }

  .stop-info { flex: 1; }
  .stop-street { font-size: 14px; font-weight: 700; color: #ddd; }
  .stop-hnr { font-size: 12px; color: #777; margin-top: 2px; }

  .stop-ab {
    font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 700;
  }
  .stop-ab.A { background: rgba(255,204,0,0.15); color: var(--dhl-yellow); }
  .stop-ab.B { background: rgba(212,5,17,0.15); color: #ff6b6b; }

  .completed-screen { display: none; text-align: center; padding: 60px 20px; }
</style>
</head>
<body>

<header>
  <div class="logo">DHL</div>
  <div class="progress-info">Fortschritt <span id="progressText">0 / 48</span></div>
</header>
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>

<div id="mainContent">

    <div class="stop-badge" id="currentBadge">Wird geladen...</div>
    <div class="current-street" id="currentStreet">—</div>
    <div class="current-numbers">
      <strong>Hausnummern</strong>
      <span id="currentNumbers">—</span>
    </div>
    <div class="nav-buttons">
      <button class="btn-prev" onclick="prevStop()">◀</button>
      <button class="btn-done" onclick="nextStop()">✔ Nächster</button>
    </div>
  </div>

  <div class="next-preview" id="nextPreview">
    <div class="next-label">Als nächstes</div>
    <div class="next-street" id="nextStreet">—</div>
  </div>

  <div class="route-list" id="routeList"></div>
</div>

<div class="completed-screen" id="completedScreen">
  <h2>🎉 Fertig!</h2>
  <button class="btn-done" onclick="resetRoute()">Neu starten</button>

let currentIndex = 0;

function renderList() {
  const list = document.getElementById('routeList');
  list.innerHTML = '';
  stops.forEach((stop, i) => {
    const div = document.createElement('div');
    div.className = 'stop-item' + (i < currentIndex ? ' done' : i === currentIndex ? ' active' : '');
    div.onclick = () => jumpTo(i);

    const numDiv = document.createElement('div');
    numDiv.className = 'stop-num';
    numDiv.textContent = stop.zab || '↳';

    const infoDiv = document.createElement('div');
    infoDiv.className = 'stop-info';
    infoDiv.innerHTML = `<div class="stop-street">${stop.street}</div><div class="stop-hnr">HNr: ${stop.hnr}</div>`;

    div.appendChild(numDiv);
    div.appendChild(infoDiv);

    if (stop.ab) {
      const abDiv = document.createElement('div');
      abDiv.className = `stop-ab ${stop.ab}`;
      abDiv.textContent = stop.ab;
      div.appendChild(abDiv);
    }
    list.appendChild(div);
  });
}

function updateHero() {
  if (currentIndex >= stops.length) {
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('completedScreen').style.display = 'block';
    return;
  }
  const stop = stops[currentIndex];
  document.getElementById('currentBadge').textContent = stop.zab ? `Abschnitt ${stop.zab}` : '↳ Fortsetzung';
  document.getElementById('currentStreet').textContent = stop.street;
  document.getElementById('currentNumbers').textContent = stop.hnr;

  const next = stops[currentIndex + 1];
  document.getElementById('nextStreet').textContent = next 
    ? (next.zab ? `Abschnitt ${next.zab}: ` : '') + next.street 
    : '🏁 Letzter Stopp!';

  document.getElementById('progressBar').style.width = ((currentIndex / stops.length) * 100) + '%';
  document.getElementById('progressText').textContent = `${currentIndex} / ${stops.length}`;
}

function nextStop() { currentIndex++; updateHero(); renderList(); }
function prevStop() { if(currentIndex > 0) { currentIndex--; updateHero(); renderList(); } }
function jumpTo(i) { currentIndex = i; updateHero(); renderList(); }
function resetRoute() { 
  currentIndex = 0; 
  document.getElementById('mainContent').style.display = 'block'; 
  document.getElementById('completedScreen').style.display = 'none'; 
  updateHero(); renderList(); 
}

document.addEventListener('DOMContentLoaded', () => { renderList(); updateHero(); });
</script>
